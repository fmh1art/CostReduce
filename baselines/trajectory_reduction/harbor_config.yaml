agent:
  agent_class: agentdiet_harbor.agent.AgentDietHarborAgent
  step_limit: 12
  reduction_mode: ours
  reduction_threshold_tokens: 500
  reduction_context_before: 1
  reduction_context_after: 2
  reduction_show_context: true
model:
